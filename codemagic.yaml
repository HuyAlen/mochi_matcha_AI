workflows:
  ios-capacitor-debug:
    name: iOS Capacitor Debug Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      node: latest
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build Next.js app
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install iOS pods
        script: |
          cd ios/App
          pod install

      - name: Build iOS app without signing
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build/ios \
            build

    artifacts:
      - ios/App/build/ios/**/*
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
